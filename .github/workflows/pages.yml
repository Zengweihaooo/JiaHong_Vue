name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: JiaHong_YiSheng
    steps:
      - name: Checkout doctor client
        uses: actions/checkout@v4
        with:
          path: JiaHong_YiSheng

      - name: Checkout JiaHong UI
        uses: actions/checkout@v4
        with:
          repository: Zengweihaooo/JiaHong-UI
          path: JiaHong_UI
          token: ${{ secrets.JIAHONG_UI_PAT || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: JiaHong_YiSheng/package-lock.json

      - name: Install JiaHong UI dependencies
        working-directory: JiaHong_UI
        run: npm ci

      - name: Build JiaHong UI package
        working-directory: JiaHong_UI
        run: npm run build

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Pages artifact
        run: npm run build:pages

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: JiaHong_YiSheng/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
